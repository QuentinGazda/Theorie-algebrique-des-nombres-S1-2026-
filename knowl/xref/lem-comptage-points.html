</h4>
<div class="para">Soit <span class="process-math">\(\|\cdot \|\)</span> une norme sur <span class="process-math">\(V\)</span> et <span class="process-math">\(B_r\subset V\)</span> la boule de rayon <span class="process-math">\(r\)</span> pour cette norme. Soit <span class="process-math">\(v(r):=\lambda(B_r)\)</span> et <span class="process-math">\(v'(r)\)</span> sa dérivée. Alors<div class="autopermalink" data-description="Paragraphe"><a href="#lem-comptage-points-1-1" title="Permalien Paragraphe" aria-label="Permalien Paragraphe">🔗</a></div>
</div>
<div class="displaymath process-math">
\begin{equation*}
|L\cap B_r|=\frac{v(r)}{\mathrm{covol}(L)}+O(v'(r)).
\end{equation*}
</div>
